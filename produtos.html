<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Produtos — Gestão de Estoque</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="navbar-brand"><span class="dot">▣</span> Gestão de Estoque</div>
  <div class="navbar-user">
    <span>Olá, <strong id="nome-usuario"></strong></span>
    <button class="btn-logout" onclick="sair()">Sair</button>
  </div>
</nav>

<!-- MAIN -->
<main class="main-content">
  <div class="page-header">
    <div class="page-title">Cadastro de Produtos</div>
    <div class="page-subtitle">Gerencie o catálogo de produtos do sistema</div>
  </div>

  <div class="toolbar">
    <input type="text" class="search-input" id="busca" placeholder="Buscar produto por nome..." oninput="renderTabela()">
    <div class="toolbar-actions">
      <button class="btn-new" onclick="abrirModalNovo()">+ Novo Produto</button>
      <button class="btn-secondary" onclick="window.location.href='estoque.html'">Voltar</button>
    </div>
  </div>

  <div class="table-wrap">
    <table id="tabela-produtos">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Descrição</th>
          <th>Preço (R$)</th>
          <th>Estoque</th>
          <th>Estoque Mín.</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tbody-produtos"></tbody>
    </table>
  </div>
</main>

<!-- MODAL NOVO / EDITAR PRODUTO -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-titulo">Novo Produto</h2>
    </div>
    <div class="modal-body">
      <input type="hidden" id="campo-id">
      <div class="field-group">
        <label>Nome *</label>
        <input type="text" id="campo-nome" placeholder="Nome do produto">
      </div>
      <div class="field-group">
        <label>Descrição</label>
        <textarea id="campo-descricao" placeholder="Descrição do produto"></textarea>
      </div>
      <div class="field-group">
        <label>Preço (R$) *</label>
        <input type="number" id="campo-preco" placeholder="0.00" step="0.01" min="0">
      </div>
      <div class="field-group">
        <label>Quantidade *</label>
        <input type="number" id="campo-quantidade" placeholder="0" min="0">
      </div>
      <div class="field-group">
        <label>Estoque Mínimo</label>
        <input type="number" id="campo-estoque-min" value="5" min="0">
      </div>
      <div id="form-error" class="error-msg hidden">Preencha todos os campos obrigatórios.</div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="fecharModal()">Cancelar</button>
      <button class="btn-green" onclick="salvarProduto()">Salvar</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="confirm-overlay hidden" id="confirm-overlay">
  <div class="confirm-box">
    <p id="confirm-msg"></p>
    <div class="confirm-actions">
      <button class="btn-secondary" onclick="fecharConfirm()">Cancelar</button>
      <button class="btn-accent" onclick="confirmarExclusao()">OK</button>
    </div>
  </div>
</div>

<script src="db.js"></script>
<script>
  let modoEdicao = false;
  let idParaExcluir = null;

  const usuario = verificarSessao();
  document.getElementById('nome-usuario').textContent = usuario.nome;

  function sair() {
    sessionStorage.removeItem('usuario');
    window.location.href = 'login.html';
  }

  function renderTabela() {
    const busca = document.getElementById('busca').value.toLowerCase();
    let produtos = getProdutos();

    // Ordena por nome (Bubble Sort — conforme requisito)
    for (let i = 0; i < produtos.length - 1; i++) {
      for (let j = 0; j < produtos.length - 1 - i; j++) {
        if (produtos[j].nome.toLowerCase() > produtos[j+1].nome.toLowerCase()) {
          [produtos[j], produtos[j+1]] = [produtos[j+1], produtos[j]];
        }
      }
    }

    if (busca) produtos = produtos.filter(p => p.nome.toLowerCase().includes(busca));

    const tbody = document.getElementById('tbody-produtos');
    if (!produtos.length) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="7">Nenhum produto encontrado.</td></tr>`;
      return;
    }

    tbody.innerHTML = produtos.map(p => `
      <tr>
        <td class="td-id">${p.id}</td>
        <td>${p.nome}</td>
        <td>${p.descricao || '—'}</td>
        <td>R$ ${formatarMoeda(p.preco)}</td>
        <td>${p.quantidade}</td>
        <td>${p.estoque_min}</td>
        <td class="td-actions">
          <button class="btn-edit" onclick="abrirModalEditar(${p.id})">Editar</button>
          <button class="btn-delete" onclick="pedirExclusao(${p.id}, '${p.nome.replace(/'/g, "\\'")}')">Excluir</button>
        </td>
      </tr>
    `).join('');
  }

  function abrirModalNovo() {
    modoEdicao = false;
    document.getElementById('modal-titulo').textContent = 'Novo Produto';
    document.getElementById('campo-id').value = '';
    document.getElementById('campo-nome').value = '';
    document.getElementById('campo-descricao').value = '';
    document.getElementById('campo-preco').value = '';
    document.getElementById('campo-quantidade').value = '';
    document.getElementById('campo-estoque-min').value = '5';
    document.getElementById('form-error').classList.add('hidden');
    document.getElementById('modal-overlay').classList.remove('hidden');
  }

  function abrirModalEditar(id) {
    const produtos = getProdutos();
    const p = produtos.find(x => x.id === id);
    if (!p) return;
    modoEdicao = true;
    document.getElementById('modal-titulo').textContent = 'Editar Produto';
    document.getElementById('campo-id').value = p.id;
    document.getElementById('campo-nome').value = p.nome;
    document.getElementById('campo-descricao').value = p.descricao || '';
    document.getElementById('campo-preco').value = p.preco;
    document.getElementById('campo-quantidade').value = p.quantidade;
    document.getElementById('campo-estoque-min').value = p.estoque_min;
    document.getElementById('form-error').classList.add('hidden');
    document.getElementById('modal-overlay').classList.remove('hidden');
  }

  function fecharModal() {
    document.getElementById('modal-overlay').classList.add('hidden');
  }

  function salvarProduto() {
    const nome = document.getElementById('campo-nome').value.trim();
    const preco = document.getElementById('campo-preco').value;
    const qtd = document.getElementById('campo-quantidade').value;
    const err = document.getElementById('form-error');

    if (!nome || preco === '' || qtd === '') {
      err.classList.remove('hidden');
      return;
    }
    err.classList.add('hidden');

    const produtos = getProdutos();

    if (modoEdicao) {
      const id = Number(document.getElementById('campo-id').value);
      const idx = produtos.findIndex(p => p.id === id);
      if (idx !== -1) {
        produtos[idx].nome = nome;
        produtos[idx].descricao = document.getElementById('campo-descricao').value.trim();
        produtos[idx].preco = parseFloat(preco);
        produtos[idx].quantidade = parseInt(qtd);
        produtos[idx].estoque_min = parseInt(document.getElementById('campo-estoque-min').value) || 0;
      }
    } else {
      const novo = {
        id: nextId(produtos),
        nome,
        descricao: document.getElementById('campo-descricao').value.trim(),
        preco: parseFloat(preco),
        quantidade: parseInt(qtd),
        estoque_min: parseInt(document.getElementById('campo-estoque-min').value) || 0
      };
      produtos.push(novo);
    }

    saveProdutos(produtos);
    fecharModal();
    renderTabela();
  }

  function pedirExclusao(id, nome) {
    idParaExcluir = id;
    document.getElementById('confirm-msg').textContent = `Deseja excluir o produto "${nome}"?`;
    document.getElementById('confirm-overlay').classList.remove('hidden');
  }

  function fecharConfirm() {
    idParaExcluir = null;
    document.getElementById('confirm-overlay').classList.add('hidden');
  }

  function confirmarExclusao() {
    if (idParaExcluir === null) return;
    let produtos = getProdutos().filter(p => p.id !== idParaExcluir);
    saveProdutos(produtos);
    fecharConfirm();
    renderTabela();
  }

  // Fechar modal ao clicar fora
  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) fecharModal();
  });

  renderTabela();
</script>
</body>
</html>
