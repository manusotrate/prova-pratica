<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Gestão de Estoque — Login</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <div class="login-wrapper">
    <div class="login-brand">
      <span class="brand-icon">▣</span>
      <span class="brand-text">Sistema de Gestão de Estoque</span>
    </div>
    <div class="login-card">
      <div class="login-card-header">
        <h1>Acesso ao Sistema</h1>
        <p>Informe suas credenciais para continuar</p>
      </div>
      <div class="login-form">
        <div class="field-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="Digite seu e-mail" autocomplete="off">
        </div>
        <div class="field-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="Digite sua senha">
        </div>
        <div id="login-error" class="error-msg hidden">E-mail ou senha inválidos.</div>
        <button class="btn-primary full-width" onclick="fazerLogin()">Entrar</button>
      </div>
    </div>
    <div class="login-footer">
      <span>Acesso restrito a usuários autorizados</span>
    </div>
  </div>

  <script>
    // Dados de demo — em produção viria do backend MySQL
    const USUARIOS = [
      { email: "admin@estoque.com", senha: "123456", nome: "Administrador" }
    ];

    function fazerLogin() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const erro = document.getElementById('login-error');

      const usuario = USUARIOS.find(u => u.email === email && u.senha === senha);
      if (usuario) {
        sessionStorage.setItem('usuario', JSON.stringify(usuario));
        window.location.href = 'produtos.html';
      } else {
        erro.classList.remove('hidden');
        document.getElementById('email').classList.add('input-error');
        document.getElementById('senha').classList.add('input-error');
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') fazerLogin();
    });

    document.querySelectorAll('input').forEach(i => {
      i.addEventListener('input', () => {
        document.getElementById('login-error').classList.add('hidden');
        i.classList.remove('input-error');
      });
    });
  </script>
</body>
</html>
